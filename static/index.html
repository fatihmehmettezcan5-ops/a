<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Review - Ücretsiz</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>♟️ Ücretsiz Game Review</h1>
      <p>PGN yapıştır, hamleleri Chess.com benzeri etiketlerle analiz et.</p>

      <form id="review-form">
        <label for="pgn">PGN</label>
        <textarea id="pgn" name="pgn" rows="10" required>1. e4 e5 2. Nf3 Nc6 3. Bb5 a6 4. Ba4 Nf6 *</textarea>

        <div class="grid">
          <label>Stockfish Path
            <input id="stockfish_path" value="stockfish" />
          </label>
          <label>Depth
            <input id="depth" type="number" value="14" min="8" max="30" />
          </label>
          <label>Time Limit
            <input id="time_limit" type="number" value="0.08" step="0.01" min="0.01" max="2" />
          </label>
          <label>Coach Mode
            <select id="coach_mode">
              <option value="auto">auto</option>
              <option value="ai">ai</option>
              <option value="rule">rule</option>
            </select>
          </label>
        </div>

        <button type="submit">Analiz Et</button>
      </form>

      <section id="status"></section>
      <section id="summary"></section>
      <section id="moves"></section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
